name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      # pnpm must be installed BEFORE setup-node so Node's pnpm cache can resolve
      # the `pnpm` executable (otherwise: "Unable to locate executable file: pnpm").
      # Pinned to v4.4.0 specifically: the v4 line's standalone @pnpm/exe download
      # avoids v6's headless-lockfile self-install crash on 11.12.0 ("Cannot use
      # 'in' operator ... integrity"), and v4.4.0 runs on node24 (the floating
      # @v4 tag still points at a node20 build, which GitHub is deprecating).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 11.12.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.3.1
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Enforced gate: the curated linter set (.golangci.yml) must be clean.
      - name: Go lint (curated, blocking)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api

      # Visibility only: the full linter set (all linters, .golangci.full.yml).
      # A burn-down report, never a build failure. golangci-lint-action@v9 fails
      # the STEP whenever it surfaces issues (regardless of --issues-exit-code),
      # so continue-on-error is what actually keeps it non-blocking. Promote
      # linters into the curated .golangci.yml as the code is cleaned up.
      - name: Go lint (all linters, report-only)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api
          args: --config .golangci.full.yml --issues-exit-code=0

      - name: Check workspace
        run: pnpm check

      - name: Test workspace
        run: pnpm test

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        run: pnpm sonar

  # The migration chain is part of the deploy: a migration that only fails on a
  # database with history (or one a previous forced version skipped) must turn
  # CI red here, not the Render deploy. Applies the full chain on a fresh
  # postgres, then reverses the last five and re-applies them (downs matter).
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xtiitch
          POSTGRES_PASSWORD: xtiitch
          POSTGRES_DB: xtiitch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xtiitch -d xtiitch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      MIGRATE_URL: postgres://xtiitch:xtiitch@localhost:5432/xtiitch?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar -xz migrate
          sudo mv migrate /usr/local/bin/migrate

      - name: Apply the full chain on a fresh database
        run: migrate -path infra/migrations -database "$MIGRATE_URL" up

      - name: Reverse the last five migrations and re-apply
        run: |
          migrate -path infra/migrations -database "$MIGRATE_URL" down 5
          migrate -path infra/migrations -database "$MIGRATE_URL" up
          migrate -path infra/migrations -database "$MIGRATE_URL" version
