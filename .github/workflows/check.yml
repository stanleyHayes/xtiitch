name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      # pnpm must be installed BEFORE setup-node so Node's pnpm cache can resolve
      # the `pnpm` executable (otherwise: "Unable to locate executable file: pnpm").
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Enforced gate: the curated linter set (.golangci.yml) must be clean.
      - name: Go lint (curated, blocking)
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: apps/api

      # Visibility only: the full linter set (all linters, .golangci.full.yml).
      # --issues-exit-code=0 keeps it non-blocking — a burn-down report, never a
      # build failure. Promote linters into the curated .golangci.yml as the code
      # is cleaned up.
      - name: Go lint (all linters, report-only)
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: apps/api
          args: --config .golangci.full.yml --issues-exit-code=0

      - name: Check workspace
        run: pnpm check

      - name: Test workspace
        run: pnpm test

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        run: pnpm sonar
