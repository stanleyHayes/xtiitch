version: "2"

# ─────────────────────────────────────────────────────────────────────────────
# FULL linter set — EVERY linter shipped with golangci-lint (`default: all`).
# This config is REPORT-ONLY: CI runs it with --issues-exit-code=0 so it never
# fails the build; it exists purely to surface the complete findings list as a
# burn-down. The enforced/blocking gate is the curated set in .golangci.yml.
#
# Run locally:  golangci-lint run --config .golangci.full.yml ./...
# ─────────────────────────────────────────────────────────────────────────────
run:
  tests: true
  go: "1.25"

linters:
  default: all
  # No `disable:` — zero linters left out.

  settings:
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    cyclop:
      max-complexity: 15
    nestif:
      min-complexity: 5
    lll:
      line-length: 140
    revive:
      rules:
        - name: early-return
        - name: unused-parameter

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Relax the size/complexity/strictness linters on test files only; they
      # still run against all production code.
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - maintidx
          - nestif
          - dupl
          - mnd
          - exhaustruct
          - err113
          - wrapcheck
          - varnamelen
          - gochecknoglobals
          - containedctx
          - forcetypeassert
          - gosec
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
