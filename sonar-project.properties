sonar.projectKey=xtiitch
sonar.projectName=Xtiitch
sonar.projectVersion=0.0.0

sonar.sources=apps,packages,docs
sonar.tests=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.expo/**,**/.react-router/**,**/.turbo/**,**/.vercel/**,**/coverage/**,**/*.generated.*,**/vendor/**
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.go.coverage.reportPaths=apps/api/coverage.out
sonar.javascript.lcov.reportPaths=coverage/lcov.info,apps/web/coverage/lcov.info,apps/worker/coverage/lcov.info,packages/design-tokens/coverage/lcov.info,packages/schemas/coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.sonar.json
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
