services:
  postgres:
    image: postgres:16-alpine
    container_name: xtiitch-postgres
    environment:
      POSTGRES_DB: xtiitch
      POSTGRES_USER: xtiitch
      POSTGRES_PASSWORD: xtiitch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtiitch -d xtiitch"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xtiitch-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

