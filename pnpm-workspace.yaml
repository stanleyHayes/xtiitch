packages:
  - "apps/*"
  - "packages/*"

# pnpm 10+/11 blocks dependency build scripts by default (supply-chain safety),
# emitting ERR_PNPM_IGNORED_BUILDS. Allowlist the packages that legitimately need
# their native / postinstall build to run, otherwise the worker (and any esbuild
# consumer) ships without its binary and the Render build fails:
#   - esbuild: links its platform binary (used by vite + tsx across the workspace)
#   - msgpackr-extract: native msgpack addon used by the worker
onlyBuiltDependencies:
  - esbuild
  - msgpackr-extract
