# Render Blueprint for Xtiitch — https://render.com/docs/blueprint-spec
#
# Deploys the BACKEND on Render: Go API, Postgres, and Redis.
# - The four SSR web apps (marketing, storefront, dashboard, admin) deploy
#   SEPARATELY on Vercel — intentionally NOT in this blueprint.
# - The BullMQ worker is currently DISABLED (commented out at the bottom): it
#   needs WhatsApp Cloud credentials to deliver in production. Re-enable it when
#   you have WHATSAPP_PHONE_NUMBER_ID + WHATSAPP_ACCESS_TOKEN. Until then the API
#   still enqueues notifications to the DB outbox; they just aren't sent yet.
#
# Cost (chosen): Postgres = Basic (persistent). The API + Redis are FREE — free
# web services SLEEP after ~15 min idle and cold-start (~30s) on the next
# request; bump xtiitch-api to Starter for production so the Vercel frontends
# aren't waiting on a sleeping backend.
#
# Secrets are marked `sync: false` — Render prompts for them on first deploy and
# never stores them in git. Generated secrets (`generateValue`) are created once.
#
# Cross-origin: after the Vercel frontends are live, set the API's
# CORS_ALLOWED_ORIGINS, BUSINESS_DASHBOARD_BASE_URL, and STOREFRONT_BASE_URL to
# the real Vercel (or custom-domain) URLs in the Render dashboard, and point each
# Vercel app's XTIITCH_API_URL at this API's URL.

databases:
  - name: xtiitch-db
    plan: basic-256mb # persistent Basic tier (free Postgres is deleted after 30 days)
    region: oregon
    databaseName: xtiitch
    user: xtiitch

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Redis (Key Value) — free 25 MB. Backs the BullMQ notification queue.
  # ──────────────────────────────────────────────────────────────────────────
  - type: redis
    name: xtiitch-redis
    plan: free
    region: oregon
    ipAllowList: [] # internal only (reachable from services in this blueprint)
    maxmemoryPolicy: noeviction # don't drop queued jobs

  # ──────────────────────────────────────────────────────────────────────────
  # Go API — runs DB migrations on boot (goose), then serves on $PORT.
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: xtiitch-api
    runtime: go
    plan: free
    region: oregon
    rootDir: apps/api
    healthCheckPath: /healthz
    buildCommand: go build -o xtiitch-api ./cmd/api && GOBIN="$PWD" go install github.com/pressly/goose/v3/cmd/goose@latest
    startCommand: ./goose -dir ../../infra/migrations postgres "$DATABASE_URL" up && API_HTTP_ADDR=":$PORT" ./xtiitch-api
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xtiitch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xtiitch-redis
          property: connectionString
      - key: WORKER_QUEUE_NAME
        value: xtiitch.outbox # must match the worker when re-enabled
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: JWT_ISSUER
        value: xtiitch-api
      - key: JWT_AUDIENCE
        value: xtiitch-clients
      - key: MFA_ENCRYPTION_KEY
        generateValue: true
      - key: MFA_ISSUER
        value: Xtiitch
      # CORS: the browser-facing origins of the Vercel frontends — set these in
      # the Render dashboard once the Vercel URLs (or custom domains) are known.
      # Comma-separated, e.g.
      # https://xtiitch-admin.vercel.app,https://xtiitch-dashboard.vercel.app,...
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: BUSINESS_DASHBOARD_BASE_URL # the dashboard's Vercel URL
        sync: false
      - key: STOREFRONT_BASE_URL # the storefront's Vercel URL
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "Xtiitch <hello@xtiitch.com>"
      - key: ADMIN_BOOTSTRAP_EMAIL
        value: owner@xtiitch.com
      - key: ADMIN_BOOTSTRAP_DISPLAY_NAME
        value: Xtiitch Owner
      - key: ADMIN_BOOTSTRAP_ROLE
        value: owner
      # ── Secrets (set in the Render dashboard) ──
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # ── Optional features (unset → safe key-free fallbacks) ──
      - key: OPENAI_API_KEY # AI search embeddings (else deterministic dev embedder)
        sync: false
      - key: ANTHROPIC_API_KEY # AI search query understanding (else heuristic)
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN # inbound bot (empty → bot dormant)
        sync: false
      - key: WHATSAPP_APP_SECRET # verifies inbound webhook signatures
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID # bot reply sending
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false

  # ──────────────────────────────────────────────────────────────────────────
  # BullMQ worker — DISABLED for now (no WhatsApp Cloud credentials yet).
  # It sends queued notifications (order confirmations, etc.) and fails fast in
  # production without a real delivery transport, so it would restart-loop until
  # WHATSAPP_PHONE_NUMBER_ID + WHATSAPP_ACCESS_TOKEN are set. To enable: add those
  # creds and uncomment this block (Render has no free worker tier — it's Starter).
  # ──────────────────────────────────────────────────────────────────────────
  # - type: worker
  #   name: xtiitch-worker
  #   runtime: node
  #   plan: starter
  #   region: oregon
  #   buildCommand: corepack enable && pnpm install --frozen-lockfile
  #   startCommand: pnpm --filter @xtiitch/worker exec tsx src/index.ts
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: NODE_VERSION
  #       value: "22"
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: xtiitch-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         type: redis
  #         name: xtiitch-redis
  #         property: connectionString
  #     - key: WORKER_QUEUE_NAME
  #       value: xtiitch.outbox
  #     - key: NOTIFICATION_TRANSPORT
  #       value: whatsapp_cloud # must deliver in prod; use 'http' if you have a relay
  #     - key: WHATSAPP_PHONE_NUMBER_ID
  #       sync: false
  #     - key: WHATSAPP_ACCESS_TOKEN
  #       sync: false
  #     - key: WHATSAPP_API_VERSION
  #       value: v21.0
