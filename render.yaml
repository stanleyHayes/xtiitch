# Render Blueprint for Xtiitch — https://render.com/docs/blueprint-spec
#
# Deploys the BACKEND on Render: Go API, Postgres, and Redis.
# - The four SSR web apps (marketing, storefront, dashboard, admin) deploy
#   SEPARATELY on Vercel — intentionally NOT in this blueprint.
# - The BullMQ worker is ENABLED (WhatsApp Cloud credentials are now provisioned):
#   it drains the DB outbox and delivers queued notifications (order
#   confirmations, etc.) over WhatsApp Cloud. Set the WHATSAPP_* values in the
#   Render dashboard so it can deliver; it runs on a paid Starter plan (Render
#   has no free worker tier).
#
# Cost (chosen): Postgres = Basic (persistent). The API + Redis are FREE — free
# web services SLEEP after ~15 min idle and cold-start (~30s) on the next
# request; bump xtiitch-api to Starter for production so the Vercel frontends
# aren't waiting on a sleeping backend.
#
# Secrets are marked `sync: false` — Render prompts for them on first deploy and
# never stores them in git. Generated secrets (`generateValue`) are created once.
#
# Cross-origin: after the Vercel frontends are live, set the API's
# CORS_ALLOWED_ORIGINS, BUSINESS_DASHBOARD_BASE_URL, and STOREFRONT_BASE_URL to
# the real Vercel (or custom-domain) URLs in the Render dashboard, and point each
# Vercel app's XTIITCH_API_URL at this API's URL.

databases:
  - name: xtiitch-db
    plan: basic-256mb # persistent Basic tier (free Postgres is deleted after 30 days)
    region: oregon
    databaseName: xtiitch
    user: xtiitch

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Redis (Key Value) — free 25 MB. Backs the BullMQ notification queue.
  # ──────────────────────────────────────────────────────────────────────────
  - type: redis
    name: xtiitch-redis
    plan: free
    region: oregon
    ipAllowList: [] # internal only (reachable from services in this blueprint)
    maxmemoryPolicy: noeviction # don't drop queued jobs

  # ──────────────────────────────────────────────────────────────────────────
  # Go API — runs DB migrations on boot (golang-migrate), then serves on $PORT.
  # The migrations are golang-migrate format (split .up.sql/.down.sql), so the
  # migrate CLI (not goose) is the right runner. `up` exits 0 on both apply and
  # no-change, so a real failure stops the boot but restarts proceed.
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: xtiitch-api
    runtime: go
    plan: free
    region: oregon
    rootDir: apps/api
    healthCheckPath: /healthz
    buildCommand: go build -o xtiitch-api ./cmd/api && GOBIN="$PWD" go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
    startCommand: ./migrate -path ../../infra/migrations -database "$DATABASE_URL" up && API_HTTP_ADDR=":$PORT" ./xtiitch-api
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xtiitch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xtiitch-redis
          property: connectionString
      - key: WORKER_QUEUE_NAME
        value: xtiitch.outbox # must match the worker when re-enabled
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: JWT_ISSUER
        value: xtiitch-api
      - key: JWT_AUDIENCE
        value: xtiitch-clients
      - key: MFA_ENCRYPTION_KEY
        generateValue: true
      - key: MFA_ISSUER
        value: Xtiitch
      # CORS: the browser-facing origins. xtiitch.com = marketing (apex);
      # *.xtiitch.com (go-chi wildcard, one label) covers admin.xtiitch.com,
      # business.xtiitch.com, store.xtiitch.com, and every shop's
      # <handle>.xtiitch.com storefront.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://xtiitch.com,https://*.xtiitch.com"
      - key: BUSINESS_DASHBOARD_BASE_URL # business dashboard
        value: "https://business.xtiitch.com"
      - key: STOREFRONT_BASE_URL # storefront marketplace (shops at <handle>.xtiitch.com)
        value: "https://store.xtiitch.com"
      - key: RESEND_FROM_EMAIL
        value: "Xtiitch <hello@xtiitch.com>"
      - key: MARKETING_WAITLIST_EMAIL_TO # where waitlist lead notifications are emailed
        value: xcreativscompany@gmail.com
      - key: ADMIN_BOOTSTRAP_EMAIL
        value: owner@xtiitch.com
      - key: ADMIN_BOOTSTRAP_DISPLAY_NAME
        value: Xtiitch Owner
      - key: ADMIN_BOOTSTRAP_ROLE
        value: owner
      # ── Subscription VAT (Pricing Book tax decision flag) ──
      # OFF by default (rate 0 = no VAT, behaviour unchanged). Once Xtiitch
      # confirms its subscriptions are VAT-able, set the rate to 2000 for Ghana's
      # 20% effective rate (15% VAT + 2.5% NHIL + 2.5% GETFund; COVID levy
      # abolished 1 Jan 2026) in the Render dashboard. INCLUSIVE=false adds VAT at
      # checkout on top of listed prices; true treats listed prices as inclusive.
      - key: XTIITCH_SUBSCRIPTION_VAT_RATE_BPS
        value: "0"
      - key: XTIITCH_SUBSCRIPTION_VAT_INCLUSIVE
        value: "false"
      # ── Secrets (set in the Render dashboard) ──
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # ── Optional features (unset → safe key-free fallbacks) ──
      - key: OPENAI_API_KEY # AI search embeddings (else deterministic dev embedder)
        sync: false
      - key: ANTHROPIC_API_KEY # AI search query understanding (else heuristic)
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN # inbound bot (empty → bot dormant)
        sync: false
      - key: WHATSAPP_APP_SECRET # verifies inbound webhook signatures
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID # bot reply sending
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      # Approved WhatsApp AUTHENTICATION template for OTP delivery. WhatsApp only
      # delivers business-initiated (cold) codes via a template — free-form text
      # is dropped outside a 24h session. Set this to the approved template's name
      # (lang defaults to en_US) so sign-in/verification codes reach new users.
      - key: WHATSAPP_OTP_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_OTP_TEMPLATE_LANG
        value: en_US
      # SMS (Arkesel) for auth OTPs + order notifications. OTP_CHANNEL=sms (default)
      # sends codes over SMS once ARKESEL_API_KEY is set; falls back to WhatsApp,
      # then logging. SMS_SENDER_ID is the alphanumeric sender name (<=11 chars).
      - key: OTP_CHANNEL
        value: sms
      - key: SMS_SENDER_ID
        value: Xtiitch
      - key: ARKESEL_API_KEY
        sync: false

  # ──────────────────────────────────────────────────────────────────────────
  # BullMQ worker — ENABLED now that WhatsApp Cloud credentials are provisioned.
  # It drains the DB outbox and delivers queued notifications (order
  # confirmations, etc.) over WhatsApp Cloud. Set WHATSAPP_PHONE_NUMBER_ID +
  # WHATSAPP_ACCESS_TOKEN in the Render dashboard so it can deliver. Runs on a
  # paid Starter plan (Render has no free worker tier).
  # ──────────────────────────────────────────────────────────────────────────
  - type: worker
    name: xtiitch-worker
    runtime: node
    plan: starter
    region: oregon
    # Node 26's image already ships a pnpm corepack shim, and `corepack enable`
    # can't rewrite it on the read-only /usr/bin — so skip it and call pnpm
    # directly (the shim honours the pinned packageManager). The env var keeps
    # the version fetch non-interactive in CI.
    buildCommand: COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm install --frozen-lockfile
    startCommand: COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm --filter @xtiitch/worker exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "26"
      - key: DATABASE_URL
        fromDatabase:
          name: xtiitch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xtiitch-redis
          property: connectionString
      - key: WORKER_QUEUE_NAME
        value: xtiitch.outbox
      - key: NOTIFICATION_TRANSPORT
        value: whatsapp_cloud # must deliver in prod; use 'http' if you have a relay
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      # SMS (Arkesel) for order notifications drained from the outbox. Paste the
      # key in the Render dashboard. SMS_SENDER_ID is the approved sender name.
      - key: SMS_SENDER_ID
        value: Xtiitch
      - key: ARKESEL_API_KEY
        sync: false
